<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İletişim – StreamFinder</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { padding-top: 64px; }
        .sayfa { max-width: 680px; width: 100%; padding: 0 24px 80px; animation: fadeUp 0.45s ease both; }
        .geri-link { display: inline-flex; align-items: center; gap: 6px; color: var(--text-muted); text-decoration: none; font-size: 13px; font-weight: 500; margin-bottom: 32px; transition: color var(--transition); }
        .geri-link:hover { color: var(--accent); }
        .sayfa-baslik { font-family: 'Fraunces', serif; font-size: 36px; font-weight: 700; color: var(--text-primary); letter-spacing: -1px; margin-bottom: 8px; line-height: 1.1; }
        .sayfa-alt { font-size: 14px; color: var(--text-muted); margin-bottom: 32px; }
        .kart { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 28px; box-shadow: var(--shadow-sm); }
        .eposta-satir { display: flex; align-items: center; gap: 10px; margin-bottom: 28px; padding-bottom: 24px; border-bottom: 1px solid var(--border); }
        .eposta-satir a { color: var(--accent); font-size: 15px; font-weight: 600; text-decoration: none; }
        .eposta-satir a:hover { text-decoration: underline; }
        .eposta-satir span { font-size: 20px; }
        label { display: block; font-size: 13px; font-weight: 600; color: var(--text-primary); margin-bottom: 6px; letter-spacing: 0.01em; }
        .form-input { width: 100%; padding: 12px 16px; border: 1.5px solid var(--border); border-radius: var(--radius-md); font-size: 15px; font-family: 'DM Sans', sans-serif; color: var(--text-primary); background: var(--bg); outline: none; transition: border-color var(--transition), box-shadow var(--transition); box-sizing: border-box; margin-bottom: 18px; resize: vertical; }
        .form-input::placeholder { color: var(--text-muted); }
        .form-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(15,107,107,0.10); }
        textarea.form-input { min-height: 130px; }
        .form-btn { background-color: var(--accent); color: white; border: none; padding: 13px 28px; border-radius: var(--radius-md); font-size: 15px; font-family: 'DM Sans', sans-serif; font-weight: 600; cursor: pointer; transition: background-color var(--transition), transform var(--transition); }
        .form-btn:hover { background-color: var(--accent-hover); transform: translateY(-1px); }
        .basari { display: none; background: var(--accent-soft); border: 1px solid var(--accent); color: var(--accent); border-radius: var(--radius-md); padding: 14px 18px; font-size: 14px; margin-top: 14px; font-weight: 500; }
    </style>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9145233193687325" crossorigin="anonymous"></script>
</head>
<body>
<div class="sayfa">
    <a href="index.html" class="geri-link">← Ana Sayfaya Dön</a>
    <h1 class="sayfa-baslik">İletişim</h1>
    <p class="sayfa-alt">Hatalı bilgi, öneri veya herhangi bir konuda bize ulaşabilirsiniz.</p>

    <div class="kart">
        <div class="eposta-satir">
            <span>📧</span>
            <a href="mailto:sadecedesigniletisim@gmail.com">sadecedesigniletisim@gmail.com</a>
        </div>

        <label for="ad">Adınız</label>
        <input class="form-input" type="text" id="ad" placeholder="Adınız Soyadınız">

        <label for="eposta">E-posta Adresiniz</label>
        <input class="form-input" type="email" id="eposta" placeholder="ornek@mail.com">

        <label for="mesaj">Mesajınız</label>
        <textarea class="form-input" id="mesaj" placeholder="Mesajınızı buraya yazın..."></textarea>

        <button class="form-btn" onclick="formGonder()">Gönder</button>
        <div class="basari" id="basari">✓ Mesajınız alındı! En kısa sürede geri dönüş yapacağız.</div>
    </div>
</div>

<footer class="site-footer">
    <a href="hakkinda.html">Hakkında</a>
    <a href="sss.html">SSS</a>
    <a href="iletisim.html">İletişim</a>
    <a href="gizlilik.html">Gizlilik Politikası</a>
    <span>© 2026 StreamFinder</span>
</footer>

<script>
function formGonder() {
    const ad = document.getElementById("ad").value.trim();
    const eposta = document.getElementById("eposta").value.trim();
    const mesaj = document.getElementById("mesaj").value.trim();
    if (!ad || !eposta || !mesaj) { alert("Lütfen tüm alanları doldurun."); return; }
    document.getElementById("basari").style.display = "block";
    document.getElementById("ad").value = "";
    document.getElementById("eposta").value = "";
    document.getElementById("mesaj").value = "";
}
</script>
</body>
</html>
